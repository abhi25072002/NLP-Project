# Ablation Configuration
# This file controls the ablation experiments.

experiments:
  # 1. Training Set Size Ablation
  train_size:
    enabled: true
    fractions: [0.1, 0.25, 0.5, 0.75, 1.0]
    
  # 2. Generator Robustness (Held-out generators)
  held_out_generators:
    enabled: true
    train_on: ["gpt2-xl"]
    test_on: ["opt-1.3b", "bloom-1b7", "gpt-neo-1.3B"]
    
  # 3. Binoculars Parameters
  binoculars_params:
    enabled: true
    observer_models: ["tiiuae/falcon-7b", "tiiuae/falcon-7b-instruct"]
    performer_models: ["tiiuae/falcon-7b", "tiiuae/falcon-7b-instruct"]
    
  # 4. Augmentation Strategies
  augmentation:
    enabled: true
    strategies:
      - name: "baseline" # Train on default machine text only
      - name: "multi_knob" # Train on mix of temp/top-p variants
      - name: "back_translation" # Train on BT augmented data
