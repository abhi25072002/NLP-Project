# Evaluation Configuration
# This file defines the metrics and reporting settings.

metrics:
  - "accuracy"
  - "precision"
  - "recall"
  - "f1"
  - "tpr_at_fpr_0.01"
# Specific settings for Binoculars evaluation
binoculars:
  threshold_strategy: "f1_max" # or "fixed", "fpr_controlled"
  fixed_threshold: 0.9012
